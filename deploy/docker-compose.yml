services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: gatepilot
      POSTGRES_USER: gatepilot
      POSTGRES_PASSWORD: gatepilot_dev
    ports:
      - "5432:5432"
    volumes:
      - gatepilot_postgres:/var/lib/postgresql/data

  redis:
    image: redis:8
    ports:
      - "6379:6379"

  server:
    image: golang:1.26
    working_dir: /workspace/server
    command: go run ./cmd/server
    environment:
      GATEPILOT_SERVER_ADDR: ":8080"
    ports:
      - "8080:8080"
    volumes:
      - ..:/workspace
    depends_on:
      - postgres
      - redis

volumes:
  gatepilot_postgres:
